name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

      - name: Run tests with coverage
        if: matrix.python-version == '3.11'
        run: pytest --cov=prompt_firewall --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Mypy type check
        run: mypy src/prompt_firewall --ignore-missing-imports
        continue-on-error: true   # type-check is advisory for now

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit --requirement <(pip install -e . --dry-run 2>/dev/null | grep Requirement || echo "pydantic>=2.0") || true

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Bandit security scan
        run: bandit -r src/ -ll -q || true

  rule-validation:
    name: Validate Rule Files
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate injection_patterns.json
        run: python -c "
import json, re, sys
with open('rules/injection_patterns.json') as f:
    rules = json.load(f)
errors = []
for r in rules:
    try:
        re.compile(r['pattern'])
    except re.error as e:
        errors.append(f\"{r['id']}: {e}\")
if errors:
    print('Invalid patterns:', errors)
    sys.exit(1)
print(f'OK: {len(rules)} injection patterns valid')
"

      - name: Validate jailbreak_signatures.json
        run: python -c "
import json, re, sys
with open('rules/jailbreak_signatures.json') as f:
    rules = json.load(f)
errors = []
for r in rules:
    try:
        re.compile(r['pattern'], re.DOTALL)
    except re.error as e:
        errors.append(f\"{r['id']}: {e}\")
if errors:
    print('Invalid patterns:', errors)
    sys.exit(1)
print(f'OK: {len(rules)} jailbreak signatures valid')
"

  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build hatchling

      - name: Build wheel and sdist
        run: python -m build

      - name: Check dist
        run: |
          ls -la dist/
          pip install twine
          twine check dist/*
